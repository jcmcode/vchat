services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_TURN_URL: ${VITE_TURN_URL}
        VITE_TURN_USER: ${VITE_TURN_USER}
        VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL}
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      - BASIC_AUTH_HASH=${BASIC_AUTH_HASH}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - signaling
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  signaling:
    build:
      context: .
      dockerfile: packages/signaling-server/Dockerfile
    expose:
      - "3001"
    environment:
      - PORT=3001
      - ALLOWED_ORIGIN=https://${DOMAIN}
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
      - caddy_data:/caddy-data:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
